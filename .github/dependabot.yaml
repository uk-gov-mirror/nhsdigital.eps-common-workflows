version: 2

updates:
  - package-ecosystem: "github-actions"
    # Workflow files stored in the
    # default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "18:00" # UTC
    open-pull-requests-limit: 20
    commit-message:
      prefix: "Upgrade: [dependabot] - "

  ###################################
  # Poetry  #########################
  ###################################
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "20:00" # UTC
    open-pull-requests-limit: 20
    versioning-strategy: increase
    commit-message:
      prefix: "Upgrade: [dependabot] - "

  ###################################
  # NPM workspace  ##################
  ###################################
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "22:00" # UTC
    open-pull-requests-limit: 20
    versioning-strategy: increase
    commit-message:
      prefix: "Upgrade: [dependabot] - "
