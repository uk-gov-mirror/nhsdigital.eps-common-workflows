name: Pull Request

on:
  pull_request:
    branches: [main]

env:
  BRANCH_NAME: ${{ github.event.pull_request.head.ref }}

permissions: {}
jobs:
  dependabot-auto-approve-and-merge:
    needs: quality_checks
    uses: ./.github/workflows/dependabot-auto-approve-and-merge.yml
    permissions:
      contents: write
      pull-requests: write
    secrets:
      AUTOMERGE_APP_ID: ${{ secrets.AUTOMERGE_APP_ID }}
      AUTOMERGE_PEM: ${{ secrets.AUTOMERGE_PEM }}

  pr_title_format_check:
    uses: ./.github/workflows/pr_title_check.yml
    permissions:
      pull-requests: write

  get_config_values:
    uses: ./.github/workflows/get-repo-config.yml
    permissions:
      attestations: read
      contents: read
      packages: read
    with:
      verify_published_from_main_image: false

  quality_checks:
    uses: ./.github/workflows/quality-checks-devcontainer.yml
    needs: [get_config_values]
    permissions:
      contents: read
      id-token: write
      packages: read
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  tag_release:
    needs: get_config_values
    uses: ./.github/workflows/tag-release-devcontainer.yml
    permissions:
      packages: write
      id-token: write
      contents: write
    with:
      dry_run: true
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      branch_name: ${{ github.event.pull_request.head.ref }}
      tag_format: ${{ needs.get_config_values.outputs.tag_format }}
